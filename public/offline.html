<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <title>PlanIQ — Offline</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;background:#0F0E17;
      font-family:'Sora','DM Sans',system-ui,sans-serif;
      color:#F0EEFF;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:32px 24px;text-align:center;
    }
    .logo{
      width:72px;height:72px;
      background:linear-gradient(135deg,#181726,#201F30);
      border-radius:22px;display:flex;align-items:center;justify-content:center;
      margin:0 auto 24px;
      box-shadow:0 8px 32px rgba(139,124,246,.25);
      border:1.5px solid rgba(139,124,246,.2);
    }
    .logo svg{width:36px;height:36px}
    h1{font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:8px}
    .sub{font-size:14px;color:rgba(240,238,255,.45);line-height:1.6;max-width:280px;margin:0 auto 32px}
    .tip{
      background:rgba(139,124,246,.08);
      border:1px solid rgba(139,124,246,.18);
      border-radius:14px;padding:16px 20px;
      font-size:13px;color:rgba(240,238,255,.6);
      line-height:1.6;max-width:320px;margin:0 auto 28px;
      text-align:left;
    }
    .tip strong{color:#8B7CF6;display:block;margin-bottom:6px;font-size:11px;text-transform:uppercase;letter-spacing:.6px}
    .retry-btn{
      padding:14px 32px;
      background:linear-gradient(135deg,#8B7CF6,#2DD4BF);
      border:none;border-radius:14px;color:#fff;
      font-size:15px;font-weight:700;cursor:pointer;
      font-family:inherit;
      box-shadow:0 8px 24px rgba(139,124,246,.35);
    }
    .retry-btn:active{opacity:.85;transform:scale(.97)}
    .version{
      position:fixed;bottom:8px;right:10px;
      font-size:9px;color:rgba(139,124,246,.25);
      font-weight:600;letter-spacing:1.2px;text-transform:uppercase;
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <text x="5" y="27" font-family="Sora,system-ui,sans-serif" font-size="22" font-weight="800" fill="#8B7CF6">P</text>
      <circle cx="28" cy="24" r="5" fill="#8B7CF6"/>
      <circle cx="30" cy="22" r="3" fill="#2DD4BF"/>
    </svg>
  </div>
  <h1>You're Offline</h1>
  <p class="sub">No internet connection right now. Your schedules are safe — reconnect to sync.</p>
  <div class="tip">
    <strong>While you wait</strong>
    Previously loaded pages are still available. Return to the app and navigate to pages you've visited before.
  </div>
  <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
  <div class="version">PlanIQ</div>
</body>
</html>
